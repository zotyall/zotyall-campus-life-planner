<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Campus Life Planner</title>

  <link rel="stylesheet" href="styles/style.css" />
</head>

<body>

<a href="#main-content" class="skip-link">Skip to content</a>

<header>
  <h1>Campus Life Planner</h1>
  <p>Organize tasks, study sessions, and campus life</p>
</header>

<nav>
    <ul>
        <a href="#dashboard">Dashboard</a>
  <a href="#form">Add Task</a>
  <a href="#tasks">Tasks</a>
  <a href="#settings">Settings</a>
  <a href="#about">About</a>
    </ul>
  
</nav>

<main id="main-content">

  <!-- DASHBOARD -->
  <section id="dashboard">
    <h2>Dashboard</h2>

    <div class="card" id="totalTasks">Total Tasks: 0</div>
    <div class="card" id="totalDuration">Total Duration: 0 minutes</div>
    <div class="card" id="topTag">Top Tag: None</div>
  </section>

  <!-- FORM -->
  <section id="form">
    <h2>Add Task</h2>

    <form id="taskForm">
      <input id="title" placeholder="Title" required />
      <input id="dueDate" type="date" required />
      <input id="duration" type="number" required />
      <input id="tag" placeholder="Tag" required />
      <button type="submit">Add Task</button>
    </form>
  </section>

  <!-- TASKS -->
  <section id="tasks">
    <h2>Tasks</h2>
    <input id="searchInput" placeholder="Search..." />
    <div id="taskList"></div>
  </section>

  <!-- SETTINGS -->
  <section id="settings">
    <h2>Settings</h2>

    <button id="exportBtn">Export JSON</button>
    <input type="file" id="importFile" />
  </section>

  <!-- ABOUT -->
  <section id="about">
    <h2>About</h2>
    <p>Campus Life Planner helps students manage tasks efficiently.</p>
  </section>

</main>

<script type="module" src="scripts/app.js"></script>

</body>
</html>
